version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: travel-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: travel_ai
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - travel-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端 Java 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travel-backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/travel_ai?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123456
      TZ: Asia/Shanghai
    ports:
      - "3200:3200"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - travel-network
    volumes:
      - ./logs:/app/logs

  # 前端 Nginx 服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: travel-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - travel-network

# 网络
networks:
  travel-network:
    driver: bridge

# 数据卷
volumes:
  mysql_data: