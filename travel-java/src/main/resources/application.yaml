server:
  port: 3200

spring:
  application:
    name: whoa-ai
  ai:
    openai:
      base-url: xxxxxxxxx (你的API地址)
      api-key: xxxxxxxxx (你的API Key)
      chat:
        model: xxx (你的模型名称)
  datasource:
    url: jdbc:mysql://localhost:3306/travel_ai?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.whoa.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: whoa-ai-travel-secret-key-2024-must-be-long-enough
  expiration: 86400000

logging:
  level:
    com.whoa: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
